name: PR Checks

on:
  pull_request:
    branches: [develop, main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Type check
        run: npx tsc -b
      - name: Run tests
        run: npx vitest run
      - name: Build
        run: npm run build
      - name: Check bundle size
        run: |
          TOTAL=$(find dist/assets -name '*.js' -o -name '*.css' | xargs gzip -c | wc -c)
          TOTAL_KB=$((TOTAL / 1024))
          echo "Total gzipped bundle: ${TOTAL_KB}KB"
          if [ "$TOTAL_KB" -gt 200 ]; then
            echo "::warning::Bundle size ${TOTAL_KB}KB exceeds 200KB budget"
          fi
